<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Higa House</title>
<style>
  :root { --bg:#f0ede8;--surface:#faf9f7;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--text-muted:#888;--text-faint:#bbb;--panel:#ffffff; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
  #app{display:flex;height:100vh;}
  #houseWrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  #topbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface);border-bottom:0.5px solid var(--border);}
  #topbar h1{font-size:14px;font-weight:500;}
  .dot-row{display:flex;gap:5px;margin-left:auto;align-items:center;}
  .status-dot{width:8px;height:8px;border-radius:50%;}
  #sysStats{font-size:11px;color:var(--text-muted);margin-left:8px;}
  #houseCanvas{display:block;width:100%;flex:1;cursor:default;}
  #telebar{padding:6px 14px;background:var(--surface);border-top:0.5px solid var(--border);display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .tele-item{font-size:10px;color:var(--text-muted);}
  .tele-item b{color:var(--text);font-weight:500;}
  #chatPanel{width:300px;min-width:300px;display:flex;flex-direction:column;background:var(--panel);border-left:0.5px solid var(--border);}
  #chatHeader{padding:12px 14px 10px;border-bottom:0.5px solid var(--border);display:flex;flex-direction:column;gap:2px;}
  #chatBotName{font-size:13px;font-weight:500;}
  #chatBotRole{font-size:11px;color:var(--text-muted);}
  #chatColorBar{height:2px;border-radius:1px;background:#2C2C2A;margin-top:6px;transition:background 0.3s;}
  #messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
  .msg-sender{font-size:10px;color:var(--text-faint);margin-bottom:1px;}
  .msg{max-width:90%;padding:8px 11px;border-radius:10px;font-size:12px;line-height:1.55;word-break:break-word;}
  .msg.bot{background:#f4f3f0;color:var(--text);border-bottom-left-radius:3px;align-self:flex-start;}
  .msg.user{color:white;border-bottom-right-radius:3px;align-self:flex-end;}
  .thinking-dots{display:flex;gap:3px;padding:8px 11px;align-self:flex-start;}
  .thinking-dots span{width:5px;height:5px;border-radius:50%;background:#ccc;animation:blink 1.2s infinite;}
  .thinking-dots span:nth-child(2){animation-delay:0.2s;}
  .thinking-dots span:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:1}}
  #inputArea{padding:10px 12px;border-top:0.5px solid var(--border);display:flex;gap:7px;align-items:flex-end;}
  #msgInput{flex:1;resize:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;background:#f8f7f5;color:var(--text);min-height:36px;max-height:90px;line-height:1.4;outline:none;}
  #msgInput:focus{border-color:rgba(0,0,0,0.3);}
  #sendBtn{width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:15px;background:#2C2C2A;color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s,background 0.3s;}
  #sendBtn:hover{opacity:0.85;}
  #tooltip{position:absolute;background:rgba(0,0,0,0.7);color:white;font-size:11px;padding:4px 10px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity 0.15s;white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <div id="houseWrap">
    <div id="topbar">
      <h1>Higa House</h1>
      <div class="dot-row">
        <div class="status-dot" style="background:#2C2C2A" title="Jarvis"></div>
        <div class="status-dot" style="background:#1D9E75" title="Stockbot"></div>
        <div class="status-dot" style="background:#378ADD" title="Cryptoid"></div>
        <div class="status-dot" style="background:#D4537E" title="PinkslipBot"></div>
        <div class="status-dot" style="background:#5F5E5A" title="Doctorbot"></div>
        <div class="status-dot" style="background:#E24B4A" title="Ultron"></div>
        <div class="status-dot" style="background:#7F77DD" title="Robowright"></div>
        <div class="status-dot" style="background:#D85A30" title="Jamz"></div>
        <div class="status-dot" style="background:#BA7517" title="Higashop"></div>
        <div class="status-dot" style="background:#085041" title="Technoid"></div>
        <div class="status-dot" style="background:#185FA5" title="Teacherbot"></div>
      </div>
      <span id="sysStats">connecting...</span>
    </div>
    <canvas id="houseCanvas"></canvas>
    <div id="telebar">
      <span class="tele-item">BTC <b id="t-btc">--</b></span>
      <span class="tele-item">ETH <b id="t-eth">--</b></span>
      <span class="tele-item">SOL <b id="t-sol">--</b></span>
      <span class="tele-item">Portfolio <b id="t-port">--</b></span>
      <span class="tele-item">Day P&L <b id="t-pl">--</b></span>
    </div>
    <div id="tooltip"></div>
  </div>
  <div id="chatPanel">
    <div id="chatHeader">
      <div id="chatBotName">Jarvis</div>
      <div id="chatBotRole">Central intelligence · system coordinator</div>
      <div id="chatColorBar"></div>
    </div>
    <div id="messages">
      <div class="msg-sender">Jarvis</div>
      <div class="msg bot">Higa House online. All 11 bots ready. Click any bot to talk directly, or the roundtable to address everyone.</div>
    </div>
    <div id="inputArea">
      <textarea id="msgInput" placeholder="Message Jarvis..." rows="1"></textarea>
      <button id="sendBtn">&#8593;</button>
    </div>
  </div>
</div>
<script>
const BOTS = {
  jarvisbot:  {name:'Jarvis',      role:'Central intelligence · coordinator', color:'#2C2C2A', face:'J'},
  stockbot:   {name:'Stockbot',    role:'Stock analyst & trader',             color:'#1D9E75', face:'S'},
  cryptoid:   {name:'Cryptoid',    role:'Crypto & DeFi analyst',              color:'#378ADD', face:'C'},
  pinkslip:   {name:'PinkslipBot', role:'Sports betting strategist',          color:'#D4537E', face:'P'},
  doctorbot:  {name:'Doctorbot',   role:'Software engineer & code reviewer',  color:'#5F5E5A', face:'D'},
  ultron:     {name:'Ultron',      role:'Cybersecurity & hardening',          color:'#E24B4A', face:'U'},
  robowright: {name:'Robowright',  role:'Viral video creator',                color:'#7F77DD', face:'R'},
  jamz:       {name:'Jamz',        role:'Music producer · DJ · playlists',    color:'#D85A30', face:'Jz'},
  higashop:   {name:'Higashop',    role:'Etsy · TikTok Shop · reselling',     color:'#BA7517', face:'H'},
  technoid:   {name:'Technoid',    role:'Mac Mini optimizer & hardware',       color:'#085041', face:'T'},
  teacherbot: {name:'Teacherbot',  role:'K-12 curriculum & PE lessons',       color:'#185FA5', face:'Tb'},
  roundtable: {name:'Roundtable',  role:'All bots · group session',           color:'#534AB7', face:'RT'},
};

const BOT_IDS = ['jarvisbot','stockbot','cryptoid','pinkslip','doctorbot','ultron','robowright','jamz','higashop','technoid','teacherbot'];

const canvas = document.getElementById('houseCanvas');
const ctx = canvas.getContext('2d');
let W=0,H=0;

function resize(){
  const rect=canvas.parentElement.getBoundingClientRect();
  W=rect.width; H=rect.height-42-34;
  canvas.width=W; canvas.height=H;
}
window.addEventListener('resize',()=>{resize();initBotPositions();});
resize();

function getRooms(){
  const pad=14,gap=8;
  const cols=4,rows=3;
  const rW=(W-pad*2-gap*(cols-1))/cols;
  const rH=(H-pad*2-gap*(rows-1))/rows;
  const layout=[
    {id:'jarvisbot',  col:0,row:0,label:'Command center'},
    {id:'roundtable', col:1,row:0,label:'Roundtable',isTable:true,colspan:2},
    {id:'cryptoid',   col:3,row:0,label:'Crypto vault'},
    {id:'stockbot',   col:0,row:1,label:'Stock room'},
    {id:'pinkslip',   col:1,row:1,label:'Betting den'},
    {id:'doctorbot',  col:2,row:1,label:'Code lab'},
    {id:'ultron',     col:3,row:1,label:'Security hub'},
    {id:'robowright', col:0,row:2,label:'Edit suite'},
    {id:'jamz',       col:1,row:2,label:'Studio'},
    {id:'higashop',   col:2,row:2,label:'Shop floor'},
    {id:'technoid',   col:3,row:2,label:'Tech bench'},
  ];
  return layout.map(r=>{
    const span=r.colspan||1;
    const x=pad+r.col*(rW+gap);
    const y=pad+r.row*(rH+gap);
    const w=rW*span+gap*(span-1);
    const h=rH;
    return{...r,x,y,w,h,cx:x+w/2,cy:y+h/2};
  });
}

const botState={};
BOT_IDS.forEach((id,i)=>{botState[id]={x:0,y:0,tx:0,ty:0,bobOffset:i*0.28};});

function initBotPositions(){
  const rooms=getRooms();
  BOT_IDS.forEach(id=>{
    const room=rooms.find(r=>r.id===id);
    if(!room)return;
    botState[id].x=room.cx+(Math.random()-0.5)*25;
    botState[id].y=room.cy+(Math.random()-0.5)*15;
    botState[id].tx=botState[id].x;
    botState[id].ty=botState[id].y;
  });
}

let currentBot='jarvisbot',tick=0,wanderTimer=0;

function lighten(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},0.09)`;
}

function drawRoom(room){
  const bot=BOTS[room.id];
  const isActive=currentBot===room.id;
  ctx.save();
  ctx.fillStyle=isActive?lighten(bot.color):'#f8f7f4';
  if(room.isTable){
    ctx.beginPath();
    ctx.ellipse(room.cx,room.cy,room.w/2,room.h/2,0,0,Math.PI*2);
    ctx.fill();
    ctx.strokeStyle=isActive?bot.color:'#ccc';
    ctx.lineWidth=isActive?2:1;
    ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=isActive?bot.color:'#999';
    ctx.font=`500 ${Math.max(10,Math.min(11,W/70))}px -apple-system,sans-serif`;
    ctx.fillText('Roundtable',room.cx,room.cy-7);
    ctx.fillStyle='#bbb';
    ctx.font=`400 ${Math.max(9,Math.min(10,W/80))}px -apple-system,sans-serif`;
    ctx.fillText('all bots',room.cx,room.cy+8);
  }else{
    ctx.beginPath();ctx.roundRect(room.x,room.y,room.w,room.h,7);ctx.fill();
    ctx.strokeStyle=isActive?bot.color:'rgba(0,0,0,0.1)';
    ctx.lineWidth=isActive?2:0.5;ctx.stroke();
    ctx.fillStyle=isActive?bot.color:'#aaa';
    ctx.font=`500 ${Math.max(9,Math.min(11,W/70))}px -apple-system,sans-serif`;
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(room.label,room.x+8,room.y+8);
  }
  ctx.restore();
}

function drawBot(id){
  const b=botState[id];
  const bot=BOTS[id];
  const isSelected=currentBot===id;
  const bobY=Math.sin(tick*0.045+b.bobOffset*Math.PI*2)*2.5;
  const bx=b.x,by=b.y+bobY;
  const r=Math.max(10,Math.min(14,W/55));
  ctx.save();
  if(isSelected){
    ctx.strokeStyle=bot.color;ctx.lineWidth=2;ctx.setLineDash([3,3]);
    ctx.beginPath();ctx.arc(bx,by-r,r+5,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  }
  ctx.fillStyle=bot.color;
  ctx.beginPath();ctx.arc(bx,by-r,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';
  ctx.font=`500 ${Math.round(r*0.78)}px -apple-system,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(bot.face,bx,by-r);
  const bH=r*1.0;
  ctx.fillStyle=bot.color;ctx.fillRect(bx-r*0.36,by,r*0.72,bH);
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.beginPath();ctx.ellipse(bx,by+bH+2,r*0.55,3,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=bot.color+'cc';
  ctx.fillRect(bx-r*0.36-r*0.5,by+2,r*0.5,bH*0.6);
  ctx.fillRect(bx+r*0.36,by+2,r*0.5,bH*0.6);
  ctx.fillStyle='#ccc';
  ctx.fillRect(bx-r*0.33,by+bH,r*0.3,bH*0.75);
  ctx.fillRect(bx+r*0.03,by+bH,r*0.3,bH*0.75);
  const fs=Math.max(7,Math.min(9,W/90));
  ctx.font=`400 ${fs}px -apple-system,sans-serif`;
  ctx.fillStyle='#777';ctx.textBaseline='alphabetic';
  ctx.fillText(id==='jarvisbot'?'jarvis':id,bx,by+bH+bH*0.75+9);
  ctx.restore();
}

function moveBot(b){
  const dx=b.tx-b.x,dy=b.ty-b.y,dist=Math.sqrt(dx*dx+dy*dy),speed=1.4;
  if(dist>speed){b.x+=(dx/dist)*speed;b.y+=(dy/dist)*speed;}
  else{b.x=b.tx;b.y=b.ty;}
}

function wander(){
  if(currentBot==='roundtable')return;
  const rooms=getRooms();
  BOT_IDS.forEach(id=>{
    if(currentBot===id)return;
    const room=rooms.find(r=>r.id===id);if(!room)return;
    const pad=18;
    botState[id].tx=room.x+pad+Math.random()*(room.w-pad*2);
    botState[id].ty=room.y+pad+Math.random()*(room.h-pad*2);
  });
}

function loop(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#ece9e3';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=2;ctx.strokeRect(6,6,W-12,H-12);
  const rooms=getRooms();
  rooms.forEach(r=>drawRoom(r));
  BOT_IDS.forEach(id=>{moveBot(botState[id]);drawBot(id);});
  tick++;wanderTimer++;
  if(wanderTimer%200===0)wander();
  requestAnimationFrame(loop);
}

function getCanvasPos(e){
  const rect=canvas.getBoundingClientRect();
  return{x:(e.clientX-rect.left)*(W/rect.width),y:(e.clientY-rect.top)*(H/rect.height)};
}
function hitRoom(x,y){
  const rooms=getRooms();
  for(const r of rooms){
    if(r.isTable){const dx=(x-r.cx)/(r.w/2),dy=(y-r.cy)/(r.h/2);if(dx*dx+dy*dy<=1)return r.id;}
    else if(x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h)return r.id;
  }
  return null;
}
function hitBot(x,y){
  const r=Math.max(10,Math.min(14,W/55))+4;
  for(const id of BOT_IDS){const b=botState[id];if(Math.sqrt((x-b.x)**2+(y-b.y)**2)<r)return id;}
  return null;
}

canvas.addEventListener('mousemove',e=>{
  const{x,y}=getCanvasPos(e);
  const hit=hitBot(x,y)||hitRoom(x,y);
  const tt=document.getElementById('tooltip');
  if(hit&&BOTS[hit]){
    canvas.style.cursor='pointer';
    tt.textContent=BOTS[hit].role;
    tt.style.left=(e.offsetX+12)+'px';tt.style.top=(e.offsetY+38)+'px';tt.style.opacity='1';
  }else{canvas.style.cursor='default';tt.style.opacity='0';}
});

canvas.addEventListener('click',e=>{
  const{x,y}=getCanvasPos(e);
  const hit=hitBot(x,y)||hitRoom(x,y);
  if(hit)selectBot(hit);
});

function selectBot(id){
  currentBot=id;
  const bot=BOTS[id];
  document.getElementById('chatBotName').textContent=bot.name;
  document.getElementById('chatBotRole').textContent=bot.role;
  document.getElementById('chatColorBar').style.background=bot.color;
  document.getElementById('sendBtn').style.background=bot.color;
  document.getElementById('msgInput').placeholder=`Message ${bot.name}...`;
  const rooms=getRooms();
  if(id==='roundtable'){
    const t=rooms.find(r=>r.id==='roundtable');
    const angles=[270,300,330,0,30,60,90,120,150,180,210];
    BOT_IDS.forEach((bid,i)=>{
      const a=angles[i]*Math.PI/180;
      botState[bid].tx=t.cx+Math.cos(a)*(t.w/2-16);
      botState[bid].ty=t.cy+Math.sin(a)*(t.h/2-10);
    });
  }else{
    const room=rooms.find(r=>r.id===id);
    if(room&&botState[id]){botState[id].tx=room.cx;botState[id].ty=room.cy+5;}
  }
  addMsg('system',`— ${bot.name} —`,id);
}

const msgsEl=document.getElementById('messages');
const inputEl=document.getElementById('msgInput');

function addMsg(role,text,botId){
  if(role==='system'){
    const d=document.createElement('div');
    d.className='msg-sender';d.style.textAlign='center';d.style.margin='4px 0';
    d.textContent=text;msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;return;
  }
  const bot=BOTS[botId||currentBot];
  if(role==='bot'){
    const s=document.createElement('div');s.className='msg-sender';
    s.textContent=bot?bot.name:botId;msgsEl.appendChild(s);
  }
  if(role==='bot'&&text.includes(':')&&text.split('\n').length>1){
    text.split('\n').forEach(line=>{
      if(!line.trim())return;
      const d=document.createElement('div');d.className='msg bot';d.textContent=line.trim();msgsEl.appendChild(d);
    });
  }else{
    const d=document.createElement('div');
    d.className=`msg ${role}`;
    if(role==='user')d.style.background=bot?bot.color:'#555';
    d.textContent=text;msgsEl.appendChild(d);
  }
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

let thinkingEl=null;
function showThinking(){thinkingEl=document.createElement('div');thinkingEl.className='thinking-dots';thinkingEl.innerHTML='<span></span><span></span><span></span>';msgsEl.appendChild(thinkingEl);msgsEl.scrollTop=msgsEl.scrollHeight;}
function hideThinking(){if(thinkingEl){thinkingEl.remove();thinkingEl=null;}}

function sendMessage(){
  const text=inputEl.value.trim();
  const botId=currentBot==='roundtable'?'roundtable':currentBot;
  if(!text||!ws||ws.readyState!==WebSocket.OPEN)return;
  addMsg('user',text,currentBot);
  inputEl.value='';inputEl.style.height='auto';
  showThinking();
  ws.send(JSON.stringify({bot:botId,message:text}));
}
inputEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
inputEl.addEventListener('input',()=>{inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,90)+'px';});
document.getElementById('sendBtn').addEventListener('click',sendMessage);

let ws;
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws/house`);
  ws.onopen=()=>{document.getElementById('sysStats').textContent='● connected · 11 bots online';};
  ws.onmessage=e=>{
    const data=JSON.parse(e.data);
    if(data.type==='telemetry'){
      (data.stocks||[]).forEach(s=>{const el=document.getElementById('t-'+s.symbol.toLowerCase());if(el)el.textContent='$'+s.price;});
      if(data.portfolio){
        document.getElementById('t-port').textContent='$'+(data.portfolio.equity||'--');
        const pl=document.getElementById('t-pl');pl.textContent=data.portfolio.day_pl||'--';
        pl.style.color=(data.portfolio.day_pl||'').startsWith('+')?'#1D9E75':'#E24B4A';
      }
      if(data.stats)document.getElementById('sysStats').textContent=`● CPU ${data.stats.load}% · RAM ${data.stats.ram}% · ${data.stats.uptime}`;
      return;
    }
    if(data.type==='answer'){hideThinking();addMsg('bot',data.text,data.bot||currentBot);}
  };
  ws.onclose=()=>{document.getElementById('sysStats').textContent='○ disconnected — reconnecting...';setTimeout(connect,3000);};
  ws.onerror=()=>ws.close();
}

initBotPositions();
wander();
loop();
connect();
</script>
</body>
</html>
