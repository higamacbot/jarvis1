<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIGA HOUSE // COMMAND CENTER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00FFFF;--cyan-dim:rgba(0,255,255,0.12);--cyan-glow:rgba(0,255,255,0.35);--orange:#FF6B35;--purple:#7B4FFF;--green:#00FF88;--red:#FF3355;--bg:#03040D;--bg2:#070A1A;--bg3:#0A0F22;--border:rgba(0,255,255,0.18);--text:#C8E8FF;--text-dim:#3A5070;--font-mono:'Share Tech Mono',monospace;--font-hud:'Orbitron',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 8% 18%,rgba(255,255,255,0.55) 0%,transparent 100%),radial-gradient(1px 1px at 28% 62%,rgba(255,255,255,0.35) 0%,transparent 100%),radial-gradient(1px 1px at 52% 8%,rgba(255,255,255,0.45) 0%,transparent 100%),radial-gradient(1px 1px at 72% 78%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 91% 38%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 17% 88%,rgba(255,255,255,0.35) 0%,transparent 100%),radial-gradient(1px 1px at 82% 12%,rgba(255,255,255,0.45) 0%,transparent 100%),radial-gradient(1px 1px at 44% 52%,rgba(0,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 63% 28%,rgba(123,79,255,0.45) 0%,transparent 100%),radial-gradient(1px 1px at 35% 72%,rgba(0,255,136,0.35) 0%,transparent 100%);pointer-events:none;z-index:0;}
#app{position:relative;display:grid;grid-template-rows:52px 1fr 32px;height:100vh;z-index:1;}
#topbar{display:flex;align-items:center;gap:14px;padding:0 18px;background:linear-gradient(90deg,rgba(0,255,255,0.06) 0%,transparent 100%);border-bottom:1px solid var(--border);position:relative;}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--cyan),transparent 55%);}
#logo{font-family:var(--font-hud);font-size:15px;font-weight:900;color:var(--cyan);letter-spacing:0.18em;text-shadow:0 0 18px var(--cyan),0 0 36px var(--cyan-glow);}
#logo span{color:var(--orange);}
.ts{display:flex;flex-direction:column;gap:1px;padding:0 10px;border-left:1px solid var(--border);}
.tsl{font-size:7px;color:var(--text-dim);letter-spacing:0.1em;}
.tsv{font-size:12px;color:var(--cyan);font-weight:bold;}
.tsv.pos{color:var(--green);}
.tsv.neg{color:var(--red);}
#sysstat{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:10px;color:var(--text-dim);}
.pdot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pa 2s infinite;}
@keyframes pa{0%,100%{opacity:1}50%{opacity:0.3}}
#main{display:grid;grid-template-columns:1fr 300px;overflow:hidden;}
#hgrid{position:relative;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:7px;overflow:hidden;}
#hgrid::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,255,0.012) 2px,rgba(0,255,255,0.012) 4px);pointer-events:none;z-index:5;}
.room{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:3px;cursor:pointer;overflow:hidden;transition:all 0.2s;}
.room:hover{border-color:var(--cyan);box-shadow:0 0 12px var(--cyan-glow),inset 0 0 12px var(--cyan-dim);}
.room.active{border-color:var(--cyan);box-shadow:0 0 18px var(--cyan-glow),inset 0 0 18px var(--cyan-dim);}
.room.active::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}
.room.rt{border-color:rgba(123,79,255,0.35);background:radial-gradient(ellipse at center,rgba(123,79,255,0.07) 0%,var(--bg2) 70%);}
.room.rt:hover{border-color:var(--purple);box-shadow:0 0 14px rgba(123,79,255,0.5),inset 0 0 14px rgba(123,79,255,0.08);}
.room.rt.active{border-color:var(--purple);box-shadow:0 0 20px rgba(123,79,255,0.6),inset 0 0 20px rgba(123,79,255,0.1);}
.room.rt.active::after{background:var(--purple);box-shadow:0 0 8px var(--purple);}
.rlabel{position:absolute;top:6px;left:7px;font-size:7px;letter-spacing:0.12em;color:var(--text-dim);text-transform:uppercase;z-index:2;pointer-events:none;}
.room.active .rlabel{color:var(--cyan);}
.room.rt .rlabel{color:rgba(123,79,255,0.7);}
.room.rt.active .rlabel{color:var(--purple);}
.rcanvas{width:100%;height:100%;display:block;}
.cdec{position:absolute;width:7px;height:7px;border-color:rgba(0,255,255,0.3);border-style:solid;}
.cdec.tl{top:2px;left:2px;border-width:1px 0 0 1px;}
.cdec.tr{top:2px;right:2px;border-width:1px 1px 0 0;}
.cdec.bl{bottom:2px;left:2px;border-width:0 0 1px 1px;}
.cdec.br{bottom:2px;right:2px;border-width:0 1px 1px 0;}
#cpanel{display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--bg2);height:100%;overflow:hidden;}
#cpanel::before{content:'';position:absolute;top:52px;right:300px;width:1px;height:calc(100vh - 84px);background:linear-gradient(180deg,var(--cyan),transparent 60%);pointer-events:none;}
#cheader{padding:10px 12px 8px;border-bottom:1px solid var(--border);background:rgba(0,255,255,0.02);flex-shrink:0;}
#cname{font-family:var(--font-hud);font-size:12px;font-weight:700;color:var(--cyan);text-shadow:0 0 8px var(--cyan);letter-spacing:0.12em;}
#crole{font-size:9px;color:var(--text-dim);margin-top:2px;letter-spacing:0.05em;}
#cbar{height:1px;margin-top:7px;background:var(--cyan);box-shadow:0 0 6px var(--cyan);transition:all 0.3s;}
#msgs{flex:1;overflow-y:scroll;overflow-x:hidden;padding:9px 10px;display:flex;flex-direction:column;gap:7px;scrollbar-width:auto;scrollbar-color:var(--cyan) transparent;word-wrap:break-word;white-space:pre-wrap;}
.msender{font-size:8px;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:1px;text-transform:uppercase;}
.mb{max-width:93%;padding:7px 9px;font-size:10px;line-height:1.6;word-break:break-word;word-wrap:break-word;white-space:normal;border-radius:2px;}
.mb.bot{background:rgba(0,255,255,0.04);border:1px solid var(--border);border-left:2px solid var(--cyan);color:var(--text);align-self:flex-start;}
.mb.user{background:rgba(0,255,255,0.09);border:1px solid var(--cyan);color:var(--cyan);align-self:flex-end;text-align:right;}
.mb.sys{text-align:center;background:transparent;border:none;color:var(--text-dim);font-size:8px;letter-spacing:0.1em;align-self:center;}
.tdots{display:flex;gap:3px;padding:7px 9px;align-self:flex-start;}
.tdots span{width:4px;height:4px;border-radius:50%;background:var(--cyan);animation:td 1.2s infinite;box-shadow:0 0 4px var(--cyan);}
.tdots span:nth-child(2){animation-delay:0.2s;}
.tdots span:nth-child(3){animation-delay:0.4s;}
@keyframes td{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
#iarea{padding:9px 10px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:flex-end;background:rgba(0,255,255,0.02);flex-shrink:0;}
#minput{flex:1;background:rgba(0,255,255,0.04);border:1px solid var(--border);border-radius:2px;padding:7px 9px;font-size:10px;font-family:var(--font-mono);color:var(--cyan);resize:none;min-height:32px;max-height:76px;outline:none;line-height:1.5;transition:border-color 0.2s;}
#minput::placeholder{color:var(--text-dim);}
#minput:focus{border-color:var(--cyan);box-shadow:0 0 6px var(--cyan-dim);}
#sbtn{width:32px;height:32px;border-radius:2px;border:1px solid var(--cyan);background:var(--cyan-dim);color:var(--cyan);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;box-shadow:0 0 6px var(--cyan-dim);}
#sbtn:hover{background:rgba(0,255,255,0.22);box-shadow:0 0 12px var(--cyan-glow);}
#bbar{display:flex;align-items:center;gap:16px;padding:0 14px;background:var(--bg2);border-top:1px solid var(--border);font-size:9px;color:var(--text-dim);letter-spacing:0.06em;}
.bi b{color:var(--cyan);font-weight:normal;}
#cstat{margin-left:auto;display:flex;align-items:center;gap:5px;}
#tt{position:fixed;background:var(--bg3);border:1px solid var(--cyan);color:var(--cyan);font-size:9px;padding:3px 9px;border-radius:2px;pointer-events:none;opacity:0;transition:opacity 0.15s;white-space:nowrap;letter-spacing:0.05em;box-shadow:0 0 8px var(--cyan-dim);z-index:100;}
</style>
</head>
<body>
<div id="app">
<div id="topbar">
  <div id="logo">HIGA<span>.</span>HOUSE</div>
  <div class="ts"><div class="tsl">BTC</div><div class="tsv" id="t-btc">--</div></div>
  <div class="ts"><div class="tsl">ETH</div><div class="tsv" id="t-eth">--</div></div>
  <div class="ts"><div class="tsl">SOL</div><div class="tsv" id="t-sol">--</div></div>
  <div class="ts"><div class="tsl">PORTFOLIO</div><div class="tsv" id="t-port">--</div></div>
  <div class="ts"><div class="tsl">DAY P&L</div><div class="tsv" id="t-pl">--</div></div>
  <div id="sysstat"><div class="pdot"></div><span id="systxt">CONNECTING...</span></div>
</div>
<div id="main">
  <div id="hgrid"></div>
  <div id="cpanel">
    <div id="cheader">
      <div id="cname">JARVIS</div>
      <div id="crole">Central intelligence · system coordinator</div>
      <div id="cbar"></div>
    </div>
    <div id="msgs">
      <div class="msender">SYSTEM</div>
      <div class="mb bot">HIGA HOUSE online. All 11 agents ready. Click any room to engage, or select ROUNDTABLE for group session.</div>
    </div>
    <div id="iarea">
      <textarea id="minput" placeholder="ENTER COMMAND..." rows="1"></textarea>
      <button id="sbtn">&#8593;</button>
    </div>
  </div>
</div>
<div id="bbar">
  <span class="bi">CPU <b id="b-cpu">--</b></span>
  <span class="bi">RAM <b id="b-ram">--</b></span>
  <span class="bi">UPTIME <b id="b-up">--</b></span>
  <span class="bi">AGENTS <b style="color:var(--green)">11 ONLINE</b></span>
  <div id="cstat"><div class="pdot" id="cdot" style="background:var(--red);box-shadow:0 0 8px var(--red)"></div><span id="ctxt">OFFLINE</span></div>
</div>
</div>
<div id="tt"></div>
<script>
const BOTS={
  jarvisbot:{name:'JARVIS',role:'Central intelligence · coordinator',color:'#00FFFF',face:'J',label:'Command center'},
  stockbot:{name:'STOCKBOT',role:'Equity analyst & autonomous trader',color:'#00FF88',face:'S',label:'Stock room'},
  cryptoid:{name:'CRYPTOID',role:'Crypto & DeFi analyst',color:'#00BFFF',face:'C',label:'Crypto vault'},
  pinkslip:{name:'PINKSLIP',role:'Sports betting strategist',color:'#FF3399',face:'P',label:'Betting den'},
  doctorbot:{name:'DOCTORBOT',role:'Software engineer & code reviewer',color:'#AAAAAA',face:'D',label:'Code lab'},
  ultron:{name:'ULTRON',role:'Cybersecurity & hardening',color:'#FF3355',face:'U',label:'Security hub'},
  robowright:{name:'ROBOWRIGHT',role:'Viral video creator',color:'#7B4FFF',face:'R',label:'Edit suite'},
  jamz:{name:'JAMZ',role:'Music producer · DJ · playlists',color:'#FF6B35',face:'Jz',label:'Studio'},
  higashop:{name:'HIGASHOP',role:'Etsy · TikTok Shop · reselling',color:'#FFB800',face:'H',label:'Shop floor'},
  technoid:{name:'TECHNOID',role:'Mac Mini optimizer & hardware',color:'#00FF88',face:'T',label:'Tech bench'},
  teacherbot:{name:'TEACHERBOT',role:'K-12 curriculum & PE lessons',color:'#378ADD',face:'Tb',label:'Academy'},
  roundtable:{name:'ROUNDTABLE',role:'All agents · group session',color:'#7B4FFF',face:'RT',label:'Roundtable'},
  shaman:{name:'SHAMAN',role:'Conspiracy · InfoWars · Wendigoon',color:'#9D4EDD',face:'Sh',label:'Conspiracy room'},
  libmom:{name:'LIB MOM',role:'Progressive · MSNBC · CNN',color:'#4895EF',face:'Lm',label:'Blue room'},
  magadad:{name:'MAGA DAD',role:'Patriot · Fox News · America First',color:'#EF233C',face:'Md',label:'Red room'},
  debateroom:{name:'DEBATE ROOM',role:'All three debate · live narratives',color:'#FF6B35',face:'DB',label:'Debate arena'},
};
const BOT_IDS=['jarvisbot','stockbot','cryptoid','pinkslip','doctorbot','ultron','robowright','jamz','higashop','technoid','teacherbot','shaman','libmom','magadad'];
const LAYOUT=[
  {id:'jarvisbot',col:1,row:1,w:1,h:1},
  {id:'roundtable',col:2,row:1,w:2,h:2},
  {id:'cryptoid',col:4,row:1,w:1,h:1},
  {id:'stockbot',col:1,row:2,w:1,h:1},
  {id:'ultron',col:4,row:2,w:1,h:1},
  {id:'robowright',col:1,row:3,w:1,h:1},
  {id:'jamz',col:2,row:3,w:1,h:1},
  {id:'higashop',col:3,row:3,w:1,h:1},
  {id:'technoid',col:4,row:3,w:1,h:1},
  {id:'pinkslip',col:1,row:4,w:1,h:1},
  {id:'doctorbot',col:2,row:4,w:1,h:1},
  {id:'teacherbot',col:3,row:4,w:2,h:1},
  {id:'shaman',col:1,row:5,w:1,h:1},
  {id:'debateroom',col:2,row:5,w:2,h:2},
  {id:'libmom',col:4,row:5,w:1,h:1},
  {id:'magadad',col:1,row:6,w:1,h:1},
];
const grid=document.getElementById('hgrid');
grid.style.gridTemplateRows='repeat(6,1fr)';
LAYOUT.forEach(r=>{
  const bot=BOTS[r.id];
  const div=document.createElement('div');
  div.className='room'+(r.id==='roundtable'?' rt':'');
  div.id='room-'+r.id;
  div.style.gridColumn=`${r.col}/span ${r.w}`;
  div.style.gridRow=`${r.row}/span ${r.h}`;
  div.innerHTML=`<div class="cdec tl"></div><div class="cdec tr"></div><div class="cdec bl"></div><div class="cdec br"></div><div class="rlabel">${bot.label}</div><canvas class="rcanvas" id="cv-${r.id}"></canvas>`;
  div.addEventListener('click',()=>{
    if(r.id==='debateroom'){
      selectBot('debateroom');
    } else {
      selectBot(r.id);
    }
  });
  div.addEventListener('mouseenter',e=>showTT(e,bot.role));
  div.addEventListener('mouseleave',()=>{document.getElementById('tt').style.opacity='0';});
  grid.appendChild(div);
});

const BA={};
BOT_IDS.forEach((id,i)=>{BA[id]={x:0,y:0,tx:0,ty:0,bob:i*0.3,wt:Math.random()*180};});
let tick=0,curBot='jarvisbot';

function drawRoom(id){
  const cv=document.getElementById('cv-'+id);if(!cv)return;
  const rm=document.getElementById('room-'+id);if(!rm)return;
  const W=rm.offsetWidth,H=rm.offsetHeight;if(!W||!H)return;
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const bot=BOTS[id];
  const isAct=curBot===id;
  if(id==='roundtable'){drawRT(ctx,W,H,isAct);return;}
  const b=BA[id];if(!b)return;
  if(b.x===0){b.x=W/2;b.y=H/2;b.tx=W/2;b.ty=H/2;}
  const dx=b.tx-b.x,dy=b.ty-b.y,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>1.2){b.x+=dx/dist*1.2;b.y+=dy/dist*1.2;}else{b.x=b.tx;b.y=b.ty;}
  b.wt--;
  if(b.wt<=0&&curBot!==id){const p=20;b.tx=p+Math.random()*(W-p*2);b.ty=p+Math.random()*(H-p*2);b.wt=140+Math.random()*140;}
  const bobY=Math.sin(tick*0.045+b.bob*Math.PI*2)*2;
  const bx=b.x,by=b.y+bobY;
  const r=Math.max(9,Math.min(14,W/6));
  if(isAct){
    ctx.beginPath();ctx.arc(bx,by-r,r+7,0,Math.PI*2);
    ctx.strokeStyle=bot.color;ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.globalAlpha=0.6+Math.sin(tick*0.05)*0.3;ctx.stroke();
    ctx.setLineDash([]);ctx.globalAlpha=1;
  }
  const g=ctx.createRadialGradient(bx,by-r,0,bx,by-r,r*2.2);
  g.addColorStop(0,bot.color+'2a');g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by-r,r*2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(bx,by-r,r,0,Math.PI*2);
  ctx.fillStyle=bot.color+'1a';ctx.fill();
  ctx.strokeStyle=bot.color;ctx.lineWidth=1.5;ctx.stroke();
  ctx.fillStyle=bot.color;
  ctx.font=`bold ${Math.round(r*0.78)}px 'Share Tech Mono',monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=bot.color;ctx.shadowBlur=8;
  ctx.fillText(bot.face,bx,by-r);ctx.shadowBlur=0;
  const bH=r;
  ctx.fillStyle=bot.color+'2a';ctx.strokeStyle=bot.color;ctx.lineWidth=1;
  ctx.fillRect(bx-r*.34,by,r*.68,bH);ctx.strokeRect(bx-r*.34,by,r*.68,bH);
  ctx.fillRect(bx-r*.34-r*.42,by+2,r*.42,bH*.58);ctx.strokeRect(bx-r*.34-r*.42,by+2,r*.42,bH*.58);
  ctx.fillRect(bx+r*.34,by+2,r*.42,bH*.58);ctx.strokeRect(bx+r*.34,by+2,r*.42,bH*.58);
  ctx.fillRect(bx-r*.3,by+bH,r*.26,bH*.65);ctx.strokeRect(bx-r*.3,by+bH,r*.26,bH*.65);
  ctx.fillRect(bx+r*.04,by+bH,r*.26,bH*.65);ctx.strokeRect(bx+r*.04,by+bH,r*.26,bH*.65);
  const fs=Math.max(6,Math.min(8,W/18));
  ctx.font=`${fs}px 'Share Tech Mono',monospace`;
  ctx.fillStyle=bot.color;ctx.textBaseline='alphabetic';
  ctx.shadowColor=bot.color;ctx.shadowBlur=4;
  ctx.fillText(id==='jarvisbot'?'jarvis':id,bx,by+bH+bH*.65+9);ctx.shadowBlur=0;
}

function drawRT(ctx,W,H,isAct){
  const cx=W/2,cy=H/2,rx=W*.38,ry=H*.3,c='#7B4FFF';
  ctx.beginPath();ctx.ellipse(cx,cy,rx+10,ry+10,0,0,Math.PI*2);
  ctx.strokeStyle=c+'2a';ctx.lineWidth=8;ctx.stroke();
  ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
  ctx.strokeStyle=isAct?c:c+'77';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);ctx.stroke();ctx.setLineDash([]);
  ctx.font=`bold 10px 'Orbitron',monospace`;ctx.fillStyle=c;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor=c;ctx.shadowBlur=10;ctx.fillText('ROUNDTABLE',cx,cy-7);ctx.shadowBlur=0;
  ctx.font=`8px 'Share Tech Mono',monospace`;ctx.fillStyle=c+'88';ctx.fillText('ALL AGENTS',cx,cy+9);
  const angles=[270,300,330,0,30,60,90,120,150,180,210];
  BOT_IDS.forEach((id,i)=>{
    const a=angles[i]*Math.PI/180;
    const bx=cx+Math.cos(a)*rx*.82,by=cy+Math.sin(a)*ry*.82;
    const bot=BOTS[id],r=Math.max(7,Math.min(11,W/22));
    ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);
    ctx.fillStyle=bot.color+'1a';ctx.fill();ctx.strokeStyle=bot.color;ctx.lineWidth=1;ctx.stroke();
    ctx.font=`bold ${Math.round(r*.72)}px 'Share Tech Mono',monospace`;
    ctx.fillStyle=bot.color;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor=bot.color;ctx.shadowBlur=5;ctx.fillText(bot.face,bx,by);ctx.shadowBlur=0;
  });
}

function loop(){tick++;[...BOT_IDS,'roundtable'].forEach(id=>drawRoom(id));requestAnimationFrame(loop);}
setTimeout(()=>loop(),150);
window.addEventListener('resize',()=>BOT_IDS.forEach(id=>{if(BA[id]){BA[id].x=0;BA[id].y=0;}}));

function selectBot(id){
  document.querySelectorAll('.room').forEach(r=>r.classList.remove('active'));
  document.getElementById('room-'+id)?.classList.add('active');
  curBot=id;
  const bot=BOTS[id];
  document.getElementById('cname').textContent=bot.name;
  document.getElementById('crole').textContent=bot.role;
  document.getElementById('cbar').style.background=bot.color;
  document.getElementById('cbar').style.boxShadow=`0 0 6px ${bot.color}`;
  document.getElementById('sbtn').style.borderColor=bot.color;
  document.getElementById('sbtn').style.color=bot.color;
  document.getElementById('minput').placeholder=`COMMAND FOR ${bot.name}...`;
  addMsg('sys',`[ ${bot.name} ENGAGED ]`,id);
}
setTimeout(()=>selectBot('jarvisbot'),200);

const msgsEl=document.getElementById('msgs');
const inp=document.getElementById('minput');

function addMsg(role,text,botId){
  const bot=BOTS[botId||curBot];
  if(role==='sys'){
    const d=document.createElement('div');d.className='mb sys';d.textContent=text;
    msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;return;
  }
  if(role==='bot'){
    const s=document.createElement('div');s.className='msender';
    s.textContent=bot?bot.name:botId;s.style.color=bot?bot.color:'var(--cyan)';
    msgsEl.appendChild(s);
  }
  if(role==='bot'&&text.includes(':')&&text.split('\n').length>1){
    text.split('\n').forEach(line=>{
      if(!line.trim())return;
      const d=document.createElement('div');d.className='mb bot';
      if(bot)d.style.borderLeftColor=bot.color;d.textContent=line.trim();msgsEl.appendChild(d);
    });
  }else{
    const d=document.createElement('div');d.className=`mb ${role}`;
    if(role==='bot'&&bot)d.style.borderLeftColor=bot.color;
    if(role==='user'&&bot){d.style.borderColor=bot.color;d.style.color=bot.color;}
    d.textContent=text;msgsEl.appendChild(d);
  }
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

let thinkEl=null;
function showThink(){
  thinkEl=document.createElement('div');thinkEl.className='tdots';
  const bot=BOTS[curBot];
  thinkEl.innerHTML='<span></span><span></span><span></span>';
  if(bot)thinkEl.querySelectorAll('span').forEach(s=>{s.style.background=bot.color;s.style.boxShadow=`0 0 4px ${bot.color}`;});
  msgsEl.appendChild(thinkEl);msgsEl.scrollTop=msgsEl.scrollHeight;
}
function hideThink(){if(thinkEl){thinkEl.remove();thinkEl=null;}}

function send(){
  const text=inp.value.trim();
  if(!text||!ws||ws.readyState!==WebSocket.OPEN)return;
  addMsg('user',text,curBot);inp.value='';inp.style.height='auto';
  showThink();ws.send(JSON.stringify({bot:curBot,message:text}));
}
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,76)+'px';});
document.getElementById('sbtn').addEventListener('click',send);

function showTT(e,text){
  const t=document.getElementById('tt');t.textContent=text;
  t.style.left=(e.clientX+10)+'px';t.style.top=(e.clientY-26)+'px';t.style.opacity='1';
}

let ws;
function connect(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws/house`);
  ws.onopen=()=>{
    const d=document.getElementById('cdot');d.style.background='var(--green)';d.style.boxShadow='0 0 8px var(--green)';
    document.getElementById('ctxt').textContent='ONLINE';
  };
  ws.onmessage=e=>{
    const data=JSON.parse(e.data);
    if(data.type==='telemetry'){
      (data.stocks||[]).forEach(s=>{const el=document.getElementById('t-'+s.symbol.toLowerCase());if(el)el.textContent='$'+s.price;});
      if(data.portfolio){
        const p=data.portfolio;
        document.getElementById('t-port').textContent=p.equity!=='0.00'?'$'+p.equity:'--';
        const pl=document.getElementById('t-pl');pl.textContent=p.day_pl||'--';
        pl.className='tsv'+((p.day_pl||'').startsWith('+')?' pos':(p.day_pl||'').startsWith('-')?' neg':'');
      }
      if(data.stats){
        document.getElementById('systxt').textContent=`CPU ${data.stats.load}% · RAM ${data.stats.ram}% · ${data.stats.uptime}`;
        document.getElementById('b-cpu').textContent=data.stats.load+'%';
        document.getElementById('b-ram').textContent=data.stats.ram+'%';
        document.getElementById('b-up').textContent=data.stats.uptime;
      }
      return;
    }
    if(data.type==='answer'){hideThink();addMsg('bot',data.text,data.bot||curBot);}
  };
  ws.onclose=()=>{
    const d=document.getElementById('cdot');d.style.background='var(--red)';d.style.boxShadow='0 0 8px var(--red)';
    document.getElementById('ctxt').textContent='RECONNECTING...';setTimeout(connect,3000);
  };
  ws.onerror=()=>ws.close();
}
connect();

// ── BOT STATUS ROOM COLORS ─────────────────────────────────────────────────
const STATUS_COLORS = {
  idle:         '#0044AA',   // blue
  working:      '#AA8800',   // yellow
  review_ready: '#006600',   // green
  blocked:      '#AA0000',   // red
};
const STATUS_GLOW = {
  idle:         '0 0 10px rgba(0,100,255,0.4)',
  working:      '0 0 10px rgba(255,200,0,0.4)',
  review_ready: '0 0 10px rgba(0,255,100,0.4)',
  blocked:      '0 0 14px rgba(255,0,0,0.6)',
};
const STATUS_DOT = {
  idle:         '#0088FF',
  working:      '#FFD700',
  review_ready: '#00FF88',
  blocked:      '#FF3355',
};

function applyBotStatuses(statuses) {
  Object.entries(statuses).forEach(([botId, data]) => {
    const room = document.getElementById('room-' + botId);
    if (!room) return;
    const status = data.status || 'idle';
    const color  = STATUS_COLORS[status]  || STATUS_COLORS.idle;
    const glow   = STATUS_GLOW[status]    || STATUS_GLOW.idle;
    room.style.borderColor = color;
    room.style.boxShadow   = glow;

    // Add/update status dot indicator
    let dot = room.querySelector('.status-dot');
    if (!dot) {
      dot = document.createElement('div');
      dot.className = 'status-dot';
      dot.style.cssText = 'position:absolute;bottom:5px;right:5px;width:6px;height:6px;border-radius:50%;z-index:10;';
      room.appendChild(dot);
    }
    dot.style.background  = STATUS_DOT[status] || STATUS_DOT.idle;
    dot.style.boxShadow   = `0 0 5px ${STATUS_DOT[status] || STATUS_DOT.idle}`;
    dot.title = `${data.status} — ${data.current_task}`;
  });
}

async function pollBotStatuses() {
  try {
    const r = await fetch('/api/bots/status');
    if (r.ok) {
      const statuses = await r.json();
      applyBotStatuses(statuses);
    }
  } catch(e) {
    console.warn('Bot status poll failed:', e);
  }
}

// Poll immediately then every 3 seconds
pollBotStatuses();
setInterval(pollBotStatuses, 3000);
// ──────────────────────────────────────────────────────────────────────────
