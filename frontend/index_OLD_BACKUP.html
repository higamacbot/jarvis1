<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. | Sovereign Intelligence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        :root {
            --bg-deep: #0a0e1a;
            --bg-panel: #111b33;
            --highlight: #00ffff;
            --accent: #163b8f;
            --text: #e0eaff;
            --up: #4ade80;
            --down: #f87171;
        }
        body {
            background-color: var(--bg-deep);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            margin: 0; display: grid;
            grid-template-columns: 320px 1fr 380px;
            grid-template-rows: 60px 1fr;
            height: 100vh; overflow: hidden;
        }
        header {
            grid-column: 1 / -1;
            background: var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; border-bottom: 1px solid var(--highlight);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }
        #sidebar-left, #chat-right {
            background: rgba(10, 14, 26, 0.8);
            padding: 20px; border: 1px solid rgba(0, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 15px; overflow-y: auto;
        }
        .panel {
            background: var(--bg-panel);
            border-radius: 8px; padding: 15px;
            border-left: 3px solid var(--highlight);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h3 { color: var(--highlight); margin: 0 0 10px 0; font-size: 0.9rem; text-transform: uppercase; }
        
        /* THE CENTRAL CIRCLE */
        #main-core {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, #163b8f 0%, #0a0e1a 70%);
        }
        .circle-container {
            position: relative; width: 250px; height: 250px;
            display: flex; justify-content: center; align-items: center;
        }
        .ring {
            position: absolute; border-radius: 50%;
            border: 2px solid var(--highlight);
            opacity: 0.3; animation: pulse 4s infinite ease-in-out;
        }
        .ring1 { width: 100%; height: 100%; animation-delay: 0s; }
        .ring2 { width: 80%; height: 80%; animation-delay: 1s; }
        .ring3 { width: 60%; height: 60%; animation-delay: 2s; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.05); opacity: 0.6; box-shadow: 0 0 20px var(--highlight); }
            100% { transform: scale(1); opacity: 0.2; }
        }
        .core-dot { width: 20px; height: 20px; background: var(--highlight); border-radius: 50%; box-shadow: 0 0 15px var(--highlight); }

        /* CHAT SYSTEM */
        #chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 4px; font-size: 0.9rem; line-height: 1.4; background: rgba(22, 59, 143, 0.4); }
        .msg.user { border-right: 2px solid var(--highlight); text-align: right; }
        .msg.jarvis { border-left: 2px solid var(--highlight); color: var(--highlight); }
        
        input { 
            background: #000; border: 1px solid var(--highlight); color: white;
            padding: 10px; font-family: inherit; width: 100%; box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header>
        <div style="color: var(--highlight); font-weight: bold;">J.A.R.V.I.S. // M4 CORE</div>
        <div id="clock">00:00:00</div>
        <div id="status-tag" style="font-size: 0.8rem;">SYSTEMS OPTIMAL</div>
    </header>

    <aside id="sidebar-left">
        <div class="panel">
            <h3>📈 Market Pulse</h3>
            <div id="markets">Loading...</div>
        </div>
        <div class="panel">
            <h3>💰 Portfolio</h3>
            <div id="equity" style="font-size: 1.5rem;">$0.00</div>
            <div id="positions"></div>
        </div>
        <div class="panel">
            <h3>🚨 Alerts</h3>
            <div id="alerts" style="color: var(--down); font-size: 0.8rem;">No active threats.</div>
        </div>
    </aside>

    <main id="main-core">
        <div class="circle-container">
            <div class="ring ring1"></div>
            <div class="ring ring2"></div>
            <div class="ring ring3"></div>
            <div class="core-dot"></div>
        </div>
        <p id="voice-status" style="margin-top: 30px; color: var(--highlight); letter-spacing: 2px;">LISTENING</p>
    </aside>

    <aside id="chat-right">
        <h3>Intelligence Feed</h3>
        <div id="chat-history">
            <div class="msg jarvis">System reboot complete. Awaiting orders, sir.</div>
        </div>
        <div style="margin-top: 10px;">
            <input type="text" id="chat-input" placeholder="Type command...">
        </div>
    </aside>

    <script>
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }
        setInterval(updateClock, 1000);

        async function refreshData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                // Update Markets
                document.getElementById('markets').innerHTML = data.markets.map(m => 
                    `<div style="display:flex; justify-content:space-between">
                        <span>${m.symbol}</span>
                        <span class="${m.change >=0 ? 'up':'down'}">${m.price}</span>
                    </div>`
                ).join('');

                // Update Portfolio
                document.getElementById('equity').innerText = `$${data.portfolio.equity.toLocaleString()}`;
                
                // Update Alerts
                if (data.news.includes("PRIORITY")) {
                    document.getElementById('alerts').innerText = "ESCALATION DETECTED";
                    document.getElementById('status-tag').style.color = "red";
                }
            } catch(e) {}
        }
        setInterval(refreshData, 30000);
        refreshData();
    </script>
</body>
</html>
