<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>J.A.R.V.I.S. | Sovereign Intelligence</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    body {
      margin: 0; 
      background-color: #000014;
      color: #00FFFF;
      font-family: 'Share Tech Mono', monospace;
      display: grid;
      grid-template-columns: 320px 1fr 380px;
      grid-template-rows: 60px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    header {
      grid-column: 1 / -1;
      background-color: #001122;
      border-bottom: 1px solid #00FFFF;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px;
      font-weight: bold;
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    #sidebar-left, #chat-right {
      background: #001122;
      padding: 15px;
      border-left: 1px solid #004444;
      border-right: 1px solid #004444;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }

    .panel {
      border: 1px solid #00FFFF;
      padding: 10px;
      background-color: #000a22;
      box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
    }

    h3 {
      margin: 0 0 10px 0;
      font-size: 0.85rem;
      text-transform: uppercase;
      border-bottom: 1px solid #00FFFF;
      padding-bottom: 5px;
      color: #00FFFF;
    }

    .grid-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 4px;
      border-bottom: 1px dotted rgba(0, 255, 255, 0.1);
    }

    .up { color: #4ade80; text-shadow: 0 0 5px #4ade80; }
    .down { color: #f87171; text-shadow: 0 0 5px #f87171; }

    #main-core {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #000011;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.1) inset;
    }

    .circle-container {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid #00FFFF;
      opacity: 0.3;
      animation: pulse 4s infinite ease-in-out;
    }

    .ring1 { width: 100%; height: 100%; }
    .ring2 { width: 75%; height: 75%; animation-delay: 1s; }
    .ring3 { width: 50%; height: 50%; animation-delay: 2s; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.1; }
      50% { transform: scale(1.1); opacity: 0.5; box-shadow: 0 0 20px #00FFFF; }
    }

    #voice-status {
      margin-top: 30px;
      font-weight: bold;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #00FFFF;
      text-shadow: 0 0 10px #00FFFF;
    }

    #chat-history {
      flex: 1;
      background-color: #000818;
      padding: 10px;
      border: 1px solid #004444;
      margin-bottom: 10px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 0.85rem;
      line-height: 1.6;
      color: #00FFFF;
    }

    #chat-input {
      background-color: #000011;
      border: 1px solid #00FFFF;
      color: #00FFFF;
      padding: 12px;
      font-family: 'Share Tech Mono', monospace;
      width: 100%;
      box-sizing: border-box;
      outline: none;
    }

    #uptime-display {
      color: #00FFFF;
      font-size: 0.9rem;
    }

    .system-status {
      font-size: 0.75rem;
      color: #00FFFF;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <header>
    <div>J.A.R.V.I.S. // M4 CORE // SOVEREIGN-INTEL</div>
    <div id="clock">00:00:00</div>
    <div id="uptime-display">UPTIME: 99.9%</div>
  </header>

  <aside id="sidebar-left">
    <div class="panel">
      <h3>📈 MARKET PULSE</h3>
      <div id="market-list">SYNCING...</div>
    </div>

    <div class="panel">
      <h3>💰 PORTFOLIO</h3>
      <div id="equity-val" style="font-size: 1.4rem;">$0.00</div>
      <div id="pos-list" style="margin-top: 10px;"></div>
    </div>

    <div class="panel">
      <h3>🚨 SYSTEM ALERTS</h3>
      <div id="alerts" style="font-size: 0.75rem;">ALL SYSTEMS GREEN</div>
    </div>
  </aside>

  <main id="main-core">
    <div class="circle-container">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <div style="width: 12px; height: 12px; background: #00FFFF; border-radius: 50%; box-shadow: 0 0 15px #00FFFF;"></div>
    </div>
    <p id="voice-status">LISTENING</p>
  </main>

  <aside id="chat-right">
    <h3>INTELLIGENCE FEED</h3>
    <div id="chat-history">>> INITIALIZING NEURAL LINK...
>> HANDSHAKE COMPLETE.</div>
    <input id="chat-input" placeholder="INPUT COMMAND..." autocomplete="off" />
  </aside>

<script>
  // Clock update
  setInterval(() => {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
  }, 1000);

  // Stock sync - fetch from 8080
  async function syncStocks() {
    try {
      const res = await fetch('http://localhost:8080/api/data');
      const data = await res.json();

      document.getElementById('market-list').innerHTML = data.markets.map(m =>
        `<div class="grid-item"><span>${m.symbol}</span><span class="${m.change >= 0 ? 'up' : 'down'}">${m.price.toFixed(2)}</span></div>`
      ).join('');

      document.getElementById('equity-val').innerText = `$${data.portfolio.equity.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
      document.getElementById('pos-list').innerHTML = data.portfolio.positions.map(p =>
        `<div class="grid-item" style="opacity:0.7;"><span>${p.symbol}</span><span>$${p.val.toFixed(0)}</span></div>`
      ).join('');

      document.getElementById('alerts').innerText = `DATA_SYNC_SUCCESS: ${new Date().toLocaleTimeString()}`;
    } catch {
      document.getElementById('alerts').innerText = 'STOCK ENGINE LINK FAILURE';
    }
  }

  setInterval(syncStocks, 10000);
  syncStocks();

  // WebSocket to brain (8000)
  const ws = new WebSocket("ws://localhost:8000/ws");
  const input = document.getElementById('chat-input');
  const history = document.getElementById('chat-history');

  input.onkeydown = (e) => {
    if (e.key === 'Enter' && input.value.trim()) {
      const msg = input.value;
      history.innerText += `\n\n>> USER: ${msg}`;
      ws.send(JSON.stringify({ message: msg }));
      input.value = '';
      document.getElementById('voice-status').innerText = "PROCESSING";
      history.scrollTop = history.scrollHeight;
    }
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'answer') {
      history.innerText += `\n\n>> JARVIS: ${data.text}`;
      document.getElementById('voice-status').innerText = "LISTENING";
      history.scrollTop = history.scrollHeight;
    }
  };
</script>
</body>
</html>
